<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>comediqx</title>
  <style>
    :root { --bg: #060a10; --accent: #5b80d4; --text: #e0e0e0; }
    body { margin:0; padding:0; font-family:system-ui; background:var(--bg); color:var(--text); overflow-x:hidden; }
    .header { padding:12px 16px; display:flex; align-items:center; gap:12px; background:rgba(0,0,0,0.6); position:sticky; top:0; z-index:10; }
    .brand img { height:42px; }
    .brand-text { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:2px; color:var(--accent); }
    button { background:var(--accent); color:white; border:none; padding:12px 24px; border-radius:9999px; cursor:pointer; font-weight:600; }

    /* RECORD SCREEN - inspired by Wavelogs */
    .record-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:20px; text-align:center; }
    .mic-container { position:relative; width:180px; height:180px; margin:0 auto 30px; }
    .mic-icon { width:120px; height:120px; animation: pulse-mic 2s infinite; }
    .waveform { display:flex; gap:6px; height:60px; align-items:flex-end; margin-top:20px; }
    .bar { width:8px; background:var(--accent); border-radius:9999px; animation: waveform 1.2s ease-in-out infinite; }
    .bar:nth-child(2) { animation-delay: 150ms; height:35%; }
    .bar:nth-child(3) { animation-delay: 300ms; height:65%; }
    .bar:nth-child(4) { animation-delay: 100ms; height:85%; }
    .bar:nth-child(5) { animation-delay: 400ms; height:45%; }
    .bar:nth-child(6) { animation-delay: 250ms; height:70%; }
    .bar:nth-child(7) { animation-delay: 80ms; height:55%; }

    @keyframes pulse-mic { 0%,100% { transform:scale(1); } 50% { transform:scale(1.08); } }
    @keyframes waveform { 0%,100% { height:20%; } 50% { height:100%; } }

    .record-btn { width:220px; height:220px; border-radius:50%; background:#c00; border:12px solid #fff; display:flex; align-items:center; justify-content:center; margin:40px auto; box-shadow:0 0 40px rgba(255,0,0,0.6); transition: all 0.2s; }
    .record-btn.recording { background:#0a0; box-shadow:0 0 40px rgba(0,255,0,0.6); }

    .timer { font-size:48px; font-weight:300; letter-spacing:4px; margin:20px 0; }
  </style>
</head>
<body>

  <!-- RECORD SCREEN -->
  <div id="screen-record" class="record-screen">
    <div class="header">
      <img src="logo.png" alt="comediqx" style="height:42px;">
      <div class="brand-text">COMEDIQX</div>
      <button onclick="showHistory()">HISTORY</button>
    </div>

    <input id="venue-input" type="text" placeholder="Venue (optional)" style="width:90%; max-width:400px; margin:40px auto 30px; padding:16px; background:#111; border:1px solid #333; color:white; border-radius:9999px; font-size:17px; text-align:center;">

    <div class="mic-container">
      <svg id="mic-icon" class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 3 3 3 3 0 0 0 3-3V5a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
      </svg>
    </div>

    <div id="record-btn" class="record-btn" onclick="toggleRecord()">
      <span style="font-size:18px; font-weight:700; color:white;">RECORD</span>
    </div>

    <div id="timer" class="timer">0:00</div>

    <!-- Animated waveform -->
    <div id="waveform" class="waveform" style="display:none;">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
  </div>

</html>
