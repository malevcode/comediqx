<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>comediqx</title>
  <style>
    :root { --bg: #060a10; --accent: #5b80d4; --text: #e0e0e0; }
    body { margin:0; padding:0; font-family:system-ui; background:var(--bg); color:var(--text); overflow-x:hidden; }
    .header { padding:12px 16px; display:flex; align-items:center; gap:12px; background:rgba(0,0,0,0.6); position:sticky; top:0; z-index:10; }
    .brand img { height:42px; }
    .brand-text { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:2px; color:var(--accent); }
    button { background:var(--accent); color:white; border:none; padding:12px 24px; border-radius:9999px; cursor:pointer; }
    .record-btn { width:180px; height:180px; border-radius:50%; background:#c00; border:8px solid #fff; font-size:18px; display:flex; align-items:center; justify-content:center; margin:40px auto; box-shadow:0 0 30px rgba(255,0,0,0.5); }
    .card { background:#111; border:1px solid rgba(91,128,212,0.3); border-radius:12px; padding:16px; margin:12px 16px; }
    .funny { text-decoration:underline wavy var(--accent); font-weight:bold; }
    .play-bit { background:#333; color:var(--accent); padding:8px 16px; border-radius:8px; font-size:14px; }
    .transcript { font-family:monospace; font-size:14px; line-height:1.5; white-space:pre-wrap; max-height:300px; overflow-y:auto; background:#1a1a1a; padding:12px; border-radius:8px; }
  </style>
</head>
<body>
  <div id="screen-record">
    <div class="header">
      <img src="logo.png" alt="comediqx" style="height:42px;">
      <div class="brand-text">COMEDIQX</div>
      <button onclick="showHistory()">HISTORY</button>
    </div>
    <input id="venue-input" type="text" placeholder="Venue (optional)" style="display:block;width:90%;margin:30px auto;padding:14px;background:#111;border:1px solid #333;color:white;border-radius:8px;font-size:16px;">
    
    <div id="record-btn" class="record-btn" onclick="toggleRecord()">RECORD</div>
    <div id="timer" style="text-align:center;font-size:32px;margin:20px 0;">0:00</div>
    <div id="level-meter" style="display:flex;justify-content:center;gap:4px;height:48px;margin:20px 16px;"></div>
  </div>

  <div id="screen-processing" style="display:none;text-align:center;padding-top:120px;">
    <h2>Processing with xAI Grok...</h2>
    <p>Uploading → Transcribing → Analyzing → Building report</p>
  </div>

  <div id="screen-results" style="display:none;">
    <div class="header">
      <div id="results-venue" style="flex:1;font-size:18px;"></div>
      <button onclick="showRecordScreen()">NEW SET</button>
    </div>
    <div style="text-align:center;margin:20px 0;">
      <div id="overall-score" style="font-size:56px;font-weight:bold;color:var(--accent);"></div>
    </div>
    <audio id="audio-player" controls style="width:90%;margin:0 auto 20px;display:block;"></audio>
    
    <div class="card"><h3>Set Overview</h3><div id="totality-stats" style="line-height:1.6;"></div></div>
    <div id="bits-container"></div>
    
    <div class="card">
      <h3>Full Transcript</h3>
      <div id="full-transcript" class="transcript"></div>
    </div>
    <button onclick="addContext()" style="margin:30px auto;display:block;">+ Add Context</button>
  </div>

  <div id="screen-history" style="display:none;">
    <div class="header">
      <img src="logo.png" alt="comediqx" style="height:42px;">
      <button onclick="showRecordScreen()">BACK</button>
    </div>
    <div id="history-list" style="padding:16px;"></div>
  </div>

  <script>
    let mediaRecorder, audioChunks = [], timerInterval, startTime, currentAudioUrl, currentSetId;
    const BASE_URL = ''; // empty = same domain (production)

    function updateLevelMeter() {
      const meter = document.getElementById('level-meter');
      meter.innerHTML = '';
      for (let i = 0; i < 8; i++) {
        const bar = document.createElement('div');
        bar.style.width = '14px';
        bar.style.height = Math.random()*40 + 12 + 'px';
        bar.style.background = '#ff0';
        bar.style.borderRadius = '2px';
        meter.appendChild(bar);
      }
    }

    async function toggleRecord() {
      const btn = document.getElementById('record-btn');
      if (!mediaRecorder || mediaRecorder.state === 'inactive') {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = processRecording;
        mediaRecorder.start();
        startTime = Date.now();
        timerInterval = setInterval(updateTimer, 1000);
        btn.textContent = 'STOP';
        btn.style.background = '#0a0';
        setInterval(updateLevelMeter, 150);
      } else {
        mediaRecorder.stop();
        clearInterval(timerInterval);
        btn.textContent = 'RECORD';
        btn.style.background = '#c00';
      }
    }

    function updateTimer() {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      document.getElementById('timer').textContent = `${Math.floor(elapsed/60)}:${(elapsed%60).toString().padStart(2,'0')}`;
    }

    async function processRecording() {
      document.getElementById('screen-record').style.display = 'none';
      document.getElementById('screen-processing').style.display = 'block';

      const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
      const formData = new FormData();
      formData.append('audio', audioBlob, 'set.webm');

      const res = await fetch('/process', { method: 'POST', body: formData });
      const data = await res.json();

      currentAudioUrl = data.audio_url || URL.createObjectURL(audioBlob);
      showResults(data);
    }

    function showResults(data) {
      document.getElementById('screen-processing').style.display = 'none';
      document.getElementById('screen-results').style.display = 'block';

      document.getElementById('results-venue').textContent = document.getElementById('venue-input').value || 'Untitled Set';
      document.getElementById('audio-player').src = currentAudioUrl;

      const avg = data.bits ? (data.bits.reduce((a,b)=>a+(b.score||5),0)/data.bits.length).toFixed(1) : '—';
      document.getElementById('overall-score').textContent = avg;

      const laughs = data.pauses ? data.pauses.length : 0;
      const dur = data.duration_sec || 300;
      document.getElementById('totality-stats').innerHTML = `
        Duration: ${dur}s<br>
        Laugh proxies: ${laughs}<br>
        Laughs/min: ${(laughs / (dur/60)).toFixed(1)}
      `;

      const container = document.getElementById('bits-container');
      container.innerHTML = '<h3 style="margin:20px 16px 10px;">Bits</h3>';
      (data.bits || []).forEach(bit => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <strong>${bit.name}</strong>
            <span style="background:var(--accent);color:#000;padding:4px 12px;border-radius:9999px;">${bit.score}</span>
          </div>
          <div><small>Setup:</small> ${bit.setup}</div>
          <div><small>Punchline:</small> <span class="funny">${bit.punchline}</span></div>
          ${bit.funny_moment ? `<div><small>Funny moment:</small> <span class="funny">${bit.funny_moment}</span></div>` : ''}
          <div style="margin:12px 0;font-style:italic;color:#ccc;">${bit.feedback || ''}</div>
          <button class="play-bit" onclick="playBit(${bit.timestamp_sec || 0})">▶ Play bit</button>
        `;
        container.appendChild(div);
      });

      document.getElementById('full-transcript').textContent = data.transcript || 'No transcript';
    }

    function playBit(seconds) {
      const audio = document.getElementById('audio-player');
      audio.currentTime = seconds;
      audio.play();
    }

    function showRecordScreen() {
      document.querySelectorAll('div[id^="screen-"]').forEach(s => s.style.display = 'none');
      document.getElementById('screen-record').style.display = 'block';
    }

    async function showHistory() {
      const res = await fetch('/sets');
      const sets = await res.json();
      const list = document.getElementById('history-list');
      list.innerHTML = sets.map(s => `
        <div class="card" onclick="alert('Set detail coming soon')">
          ${new Date(s.date).toLocaleDateString()} — ${s.venue || 'Untitled'} — ${s.overall_score || '?'} 
        </div>`).join('');
    }

    function addContext() {
      alert("Context sheet coming soon (venue, crowd size, notes)");
    }

    // Boot
    showRecordScreen();
  </script>
</body>
</html>
