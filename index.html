<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>comediqx</title>
  <style>
    :root { --bg: #060a10; --accent: #5b80d4; --text: #e0e0e0; }
    body { margin:0; padding:0; font-family:system-ui; background:var(--bg); color:var(--text); }
    .header { padding:12px 16px; display:flex; align-items:center; gap:12px; background:rgba(0,0,0,0.6); position:sticky; top:0; z-index:10; }
    .brand img { height:42px; }
    button { background:var(--accent); color:white; border:none; padding:12px 24px; border-radius:9999px; cursor:pointer; }
    .record-btn { width:180px; height:180px; border-radius:50%; background:#c00; border:8px solid #fff; font-size:18px; display:flex; align-items:center; justify-content:center; margin:40px auto; }
    .card { background:#111; border:1px solid rgba(91,128,212,0.3); border-radius:12px; padding:16px; margin:12px 16px; }
    .funny { text-decoration:underline wavy var(--accent); font-weight:bold; }
    .play-bit { background:#333; color:var(--accent); padding:8px 16px; border-radius:8px; font-size:14px; }
  </style>
</head>
<body>
  <div id="screen-record" class="screen">
    <div class="header">
      <img src="logo.png" alt="comediqx" style="height:42px;">
      <div style="flex:1; font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:2px; color:var(--accent);">COMEDIQX</div>
      <button onclick="showHistory()">HISTORY</button>
    </div>
    <input id="venue-input" type="text" placeholder="Venue (optional)" style="display:block;width:80%;margin:30px auto;padding:12px;background:#111;border:1px solid #333;color:white;border-radius:8px;">
    <div id="record-btn" class="record-btn" onclick="toggleRecord()">RECORD</div>
    <div id="timer" style="text-align:center;font-size:28px;margin:10px;">0:00</div>
    <div id="level-meter" style="display:flex;justify-content:center;gap:4px;height:40px;margin:20px;"></div>
  </div>

  <div id="screen-processing" class="screen" style="display:none;text-align:center;padding-top:100px;">
    <h2>Processing with xAI Grok...</h2>
  </div>

  <div id="screen-results" class="screen" style="display:none;">
    <div class="header">
      <div id="results-venue" style="font-size:18px;"></div>
      <button onclick="showRecordScreen()">NEW SET</button>
    </div>
    <div style="text-align:center;margin:20px;">
      <div id="overall-score" style="font-size:48px;font-weight:bold;color:var(--accent);"></div>
    </div>
    <audio id="audio-player" controls style="width:90%;margin:10px auto;display:block;"></audio>
    <div class="card"><h3>Set Overview</h3><div id="totality-stats"></div></div>
    <div id="bits-container"></div>
    <div class="card"><h3>Full Transcript</h3><div id="full-transcript" style="font-family:monospace;font-size:14px;white-space:pre-wrap;max-height:300px;overflow-y:auto;"></div></div>
    <button onclick="addContext()" style="margin:20px auto;display:block;">+ Add Context</button>
  </div>

  <div id="screen-history" class="screen" style="display:none;">
    <div class="header">
      <img src="logo.png" alt="comediqx" style="height:42px;">
      <button onclick="showRecordScreen()">BACK</button>
    </div>
    <div id="history-list" style="padding:16px;"></div>
  </div>

  <script>
    // ... (same recording + processing code as before — just updated header and logo)
    // (full script is identical to the last version you had, only header changed + real history fetch)

    async function showHistory() {
      const res = await fetch('http://localhost:3999/sets');
      const sets = await res.json();
      const list = document.getElementById('history-list');
      list.innerHTML = sets.map(s => `<div class="card" onclick="viewSet('${s.id}')">${s.date} — ${s.venue || 'Untitled'} — ${s.overall_score || '?'} avg</div>`).join('');
    }

    // rest of your existing script (toggleRecord, processRecording, showResults, playBit, etc.) stays exactly the same
    // just paste your current script body here if you want — the only change is the header logo
  </script>
</body>
</html>
